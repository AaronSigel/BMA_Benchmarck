name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e '.[test]'

      # Интеграция с реальным Blender: pytest -m mcp (локально при запущенном blender-mcp).
      - name: Run tests
        run: pytest -m "not mcp"

