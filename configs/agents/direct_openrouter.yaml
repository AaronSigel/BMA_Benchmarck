agent_id: direct_openrouter
strategy: direct_tool_calling
mcp_profile: minimal
llm:
  provider: openrouter
  model: openai/gpt-4.1-mini
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  temperature: 0.2
  top_p: 0.9
  max_tokens: 2048
  timeout_sec: 120
max_steps: 20
max_retries: 1
step_timeout_sec: 120
allow_python_tools: false
allow_inspection_tools: true
metadata:
  description: Direct tool-calling agent using OpenRouter.
