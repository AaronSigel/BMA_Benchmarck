agent_id: generic_http
strategy: remote_agent
mcp_profile: minimal
remote_agent:
  provider: generic_http
  agent_id: generic_http
  endpoint_url: http://localhost:8765/agent
  api_key_env: GENERIC_REMOTE_AGENT_API_KEY
  timeout_sec: 300
max_steps: 20
max_retries: 1
step_timeout_sec: 120
allow_python_tools: false
allow_inspection_tools: true
metadata:
  description: Opt-in generic HTTP remote agent config for integration tests.
