agent_id: react_anthropic
strategy: react
mcp_profile: minimal
llm:
  provider: anthropic
  model: claude-3-5-sonnet-latest
  api_key_env: ANTHROPIC_API_KEY
  temperature: 0.2
  top_p: 0.9
  max_tokens: 2048
  timeout_sec: 120
max_steps: 30
max_retries: 1
step_timeout_sec: 120
allow_python_tools: false
allow_inspection_tools: true
metadata:
  description: ReAct agent using Anthropic.
