matrix_id: all_run_formats_gemini_v4
title: All run formats Gemini v4
description: >
  Coverage matrix for all current benchmark run formats while holding the
  model dimension fixed to google/gemini-2.5-flash-lite.
tasks:
  ids:
    - geometry_001_basic_primitives
    - geometry_002_positions
    - geometry_003_dimensions
    - geometry_004_rotation
    - geometry_005_composition
    - materials_001_basic_colors
    - materials_002_roughness
    - materials_003_metallic
    - materials_004_multiple_objects
    - materials_005_material_composition
    - lighting_001_area_light
    - lighting_002_sun_light
    - lighting_003_three_point_lighting
    - camera_001_front_view
    - camera_002_top_view
    - camera_003_composition_view
    - export_001_blend_file
    - export_002_glb_file
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/all_run_formats_gemini_v4
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: all_run_formats_single_model
  expected_runs: 540
  preflight:
    enabled: true
    fail_fast_on_profile_error: true
  strategy_limits:
    react:
      max_steps: 15
      stop_after_scene_passed: true
