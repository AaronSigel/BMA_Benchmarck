matrix_id: baseline_matrix
title: Baseline matrix
description: Main Stage 8 baseline for comparing Direct, ReAct, and Plan-and-Execute agents on safe MCP profiles.
tasks:
  ids:
    - geometry_001_basic_primitives
    - geometry_002_positions
    - geometry_003_dimensions
    - geometry_004_rotation
    - geometry_005_composition
    - materials_001_basic_colors
    - materials_002_roughness
    - materials_003_metallic
    - materials_004_multiple_objects
    - materials_005_material_composition
    - lighting_001_area_light
    - lighting_002_sun_light
    - camera_001_front_view
    - camera_002_top_view
    - export_001_blend_file
agents:
  ids:
    - direct_openrouter
    - react_openrouter
    - plan_execute_openrouter
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
models:
  ids:
    - default
execution_modes:
  - agent_mcp
repetitions: 3
output_root: artifacts/experiments/baseline_matrix
metadata:
  notes:
    - Excludes python_enabled and full by default.
    - Excludes external asset tool profiles by using minimal/no_python/inspection_enabled only.
