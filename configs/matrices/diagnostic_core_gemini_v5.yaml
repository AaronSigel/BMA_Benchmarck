matrix_id: diagnostic_core_gemini_v5
title: Diagnostic core Gemini v5
description: >
  Fast diagnostic matrix that keeps all agent strategies and MCP profiles while
  reducing task count and repetitions.
tasks:
  ids:
    - geometry_001_basic_primitives
    - geometry_002_positions
    - materials_001_basic_colors
    - materials_002_roughness
    - lighting_001_area_light
    - camera_001_front_view
    - camera_002_top_view
    - camera_003_composition_view
    - export_002_glb_file
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/diagnostic_core_gemini_v5
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: diagnostic_core_single_model
  expected_runs: 135
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 20
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 2
  cost:
    source: openrouter
    disable_internal_estimate: true
