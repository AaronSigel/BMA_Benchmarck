matrix_id: diagnostic_repeat_gemini_v5
title: Diagnostic repeat Gemini v5
description: >
  Single-repeat diagnostic matrix for stabilized report-ready MVP:
  18 tasks × 4 strategies × 5 MCP profiles × 1 model × 1 repetition = 360 runs.
tasks:
  ids:
    - geometry_001_basic_primitives
    - geometry_002_positions
    - geometry_003_dimensions
    - geometry_004_rotation
    - geometry_005_composition
    - materials_001_basic_colors
    - materials_002_roughness
    - materials_003_metallic
    - materials_004_multiple_objects
    - materials_005_material_composition
    - lighting_001_area_light
    - lighting_002_sun_light
    - lighting_003_three_point_lighting
    - camera_001_front_view
    - camera_002_top_view
    - camera_003_composition_view
    - export_001_blend_file
    - export_002_glb_file
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
    - plan_execute_react_repair_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/diagnostic_repeat_gemini_v5
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: diagnostic_repeat_single_model_stabilized
  expected_runs: 360
  report_ready_mvp: true
  timestamp_output_root: true
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 20
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
    plan_execute_react_repair:
      max_steps: 25
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
  readiness_gates:
    export_smoke_required: true
    invalid_tool_response_export_max: 0
    clean_pass_with_error_type_max: 0
    react_max_steps_rate_max: 0.2
    require_react_repair_steps_on_validation_issues: true
  cost:
    source: openrouter
    disable_internal_estimate: true
