matrix_id: export_react_diagnostics
title: Export ReAct diagnostics
description: >
  Quick export + ReAct/Hybrid diagnostic subset:
  2 tasks × 3 strategies × 5 MCP profiles × 1 model × 1 repetition = 30 runs.
tasks:
  ids:
    - export_001_blend_file
    - export_002_glb_file
agents:
  ids:
    - plan_execute_openrouter
    - react_openrouter
    - plan_execute_react_repair_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/export_react_diagnostics
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: export_react_diagnostics
  expected_runs: 30
  report_ready_mvp: true
  timestamp_output_root: true
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 20
      max_steps_by_category:
        export: 6
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
    plan_execute_react_repair:
      max_steps: 25
      max_steps_by_category:
        export: 8
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      no_progress_limit_by_category:
        export: 5
      repair_activation_diagnostics: true
  worker_lifecycle:
    restart_every_n_runs: 30
    restart_on_tool_timeout: true
    restart_on_empty_socket_response: true
    restart_on_reset_failure: true
    restart_on_consecutive_snapshot_failures: 2
  readiness_gates:
    export_smoke_required: true
    invalid_tool_response_export_max: 0
    clean_pass_with_error_type_max: 0
    react_max_steps_rate_max: 0.2
    infra_error_rate_max: 0.05
    empty_socket_response_count_max: 0
    export_success_rate_min: 0.75
  cost:
    source: openrouter
    disable_internal_estimate: true
