matrix_id: final_multimodel_direct_rerun_v1
title: Final multimodel direct-only rerun v1
description: >
  Direct-only rerun for the final multimodel benchmark after direct JSON-action
  parser normalization. Replaces the original direct_tool_calling axis from
  final_multimodel_openrouter_v1.

tasks:
  ids:
    - geometry_001_basic_primitives
    - geometry_002_positions
    - geometry_003_dimensions
    - geometry_004_rotation
    - geometry_005_composition
    - materials_001_basic_colors
    - materials_002_roughness
    - materials_003_metallic
    - materials_004_multiple_objects
    - materials_005_material_composition
    - lighting_001_area_light
    - lighting_002_sun_light
    - lighting_003_three_point_lighting
    - camera_001_front_view
    - camera_002_top_view
    - camera_003_composition_view
    - export_001_blend_file
    - export_002_glb_file

agents:
  ids:
    - direct_openrouter
  config_root: configs/agents

mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full

models:
  ids:
    - google/gemini-2.5-flash-lite
    - openai/gpt-5-mini
    - deepseek/deepseek-chat-v3.1
    - qwen/qwen3-coder
    - mistralai/mistral-small-3.2-24b-instruct

execution_modes:
  - agent_mcp

repetitions: 2

output_root: artifacts/experiments/final_multimodel_direct_rerun_v1
report_config_path: configs/reports/default_report.yaml

metadata:
  purpose: direct_axis_replacement_after_parser_fix
  expected_runs: 900
  final_benchmark_patch: true
  report_ready_mvp: true
  timestamp_output_root: true
  replaces:
    source_matrix_id: final_multimodel_openrouter_v1
    replaced_agent_ids:
      - direct_openrouter
    replacement_reason: >
      The original direct axis exposed parser/protocol issues with nested JSON
      action formats returned by several providers. This rerun keeps the same
      tasks, models, profiles, generation profile, and repetitions, replacing
      only the direct_tool_calling axis after parser normalization.

  generation_profile:
    id: balanced_tool_use_v1
    apply_to_all_models: true
    temperature: 0.2
    top_p: 0.9
    top_k: null
    max_tokens: 6144
    seed: null
    reasoning:
      enabled: false
      effort: null
      max_reasoning_tokens: null

  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
    require_export_smoke: true
    require_tool_contract_smoke: true
    require_snapshot_smoke: true
    require_model_access_smoke: true
    require_tool_calling_smoke: true

  strategy_limits:
    direct_tool_calling:
      max_steps: 20

  worker_lifecycle:
    restart_every_n_runs: 30
    restart_on_tool_timeout: true
    restart_on_empty_socket_response: true
    restart_on_reset_failure: true
    restart_on_consecutive_snapshot_failures: 2
    health_check_after_restart: true

  readiness_gates:
    reported_success_rate_min: 0.40
    runtime_error_rate_max: 0.15
    model_failure_rate_max: 0.60
    validation_failure_rate_max: 0.60
    clean_pass_with_error_type_max: 0
    unclassified_error_max: 0
    llm_parse_error_rate_max: 0.05
    infra_error_rate_max: 0.08
