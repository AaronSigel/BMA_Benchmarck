matrix_id: lighting_readiness
title: Lighting readiness
description: >
  Focused readiness matrix for lighting_001 and lighting_003 before full diagnostic runs.
tasks:
  ids:
    - lighting_001_area_light
    - lighting_003_three_point_lighting
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
    - plan_execute_react_repair_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - inspection_enabled
  - python_enabled
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/lighting_readiness
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: lighting_readiness
  expected_runs: 24
  report_ready_mvp: true
  timestamp_output_root: true
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 20
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
    plan_execute_react_repair:
      max_steps: 25
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
  readiness_gates:
    reported_success_rate_min: 0.75
    runtime_error_rate_max: 0.10
    lighting_success_rate_min: 0.70
  cost:
    source: openrouter
    disable_internal_estimate: true
