matrix_id: model_access_smoke_openrouter_v1
title: Model access smoke OpenRouter v1
description: >
  Pre-final gate matrix: one geometry task × direct_openrouter × minimal MCP
  × five OpenRouter models × one repetition = 5 runs. Verifies model availability
  and tool-calling before the 3600-run final matrix.

tasks:
  ids:
    - geometry_001_basic_primitives

agents:
  ids:
    - direct_openrouter
  config_root: configs/agents

mcp_profiles:
  - minimal

models:
  ids:
    - google/gemini-2.5-flash-lite
    - openai/gpt-5-mini
    - deepseek/deepseek-chat-v3.1
    - qwen/qwen3-coder
    - mistralai/mistral-small-3.2-24b-instruct

execution_modes:
  - agent_mcp

repetitions: 1

output_root: artifacts/experiments/model_access_smoke_openrouter_v1
report_config_path: configs/reports/default_report.yaml

metadata:
  purpose: model_access_and_tool_calling_smoke_before_final_matrix
  expected_runs: 5
  timestamp_output_root: true

  generation_profile:
    id: balanced_tool_use_v1
    apply_to_all_models: true
    temperature: 0.2
    top_p: 0.9
    top_k: null
    max_tokens: 6144
    seed: null
    reasoning:
      enabled: false
      effort: null
      max_reasoning_tokens: null

  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
    require_export_smoke: true
    require_tool_contract_smoke: true
    require_snapshot_smoke: true
    require_model_access_smoke: false
    require_tool_calling_smoke: true

  strategy_limits:
    direct_tool_calling:
      max_steps: 10
