matrix_id: model_compare_compact_v5
title: Model compare compact v5
description: >
  Compact two-model diagnostic comparison preserving all strategies and MCP
  profiles.
tasks:
  ids:
    - geometry_001_basic_primitives
    - materials_001_basic_colors
    - lighting_001_area_light
    - camera_001_front_view
    - camera_003_composition_view
    - export_002_glb_file
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full
models:
  ids:
    - google/gemini-2.5-flash-lite
    - qwen/qwen3-14b
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/model_compare_compact_v5
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: compact_model_comparison
  expected_runs: 180
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 4
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
  cost:
    source: openrouter
    disable_internal_estimate: true
