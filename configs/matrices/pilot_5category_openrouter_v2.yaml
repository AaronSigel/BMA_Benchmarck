matrix_id: pilot_5category_openrouter_v2
title: Pilot 5-category OpenRouter live test v2
description: >
  Extended live pilot for checking the next benchmark readiness gate across
  geometry, materials, lighting, camera, and export tasks with OpenRouter,
  MCP, headless Blender, scene isolation, validation, analysis, and reporting.

tasks:
  ids:
    - geometry_001_basic_primitives
    - materials_001_basic_colors
    - lighting_001_area_light
    - camera_001_front_view
    - export_002_glb_file

agents:
  ids:
    - pilot_plan_openrouter_gemini_flash_lite
  config_root: configs/agents

mcp_profiles:
  - no_python

models:
  ids:
    - default

execution_modes:
  - agent_mcp

repetitions: 1

output_root: artifacts/experiments/pilot_5category_openrouter_v2
report_config_path: configs/reports/default_report.yaml

metadata:
  purpose: live_pilot_5category_readiness_gate
  strict_readiness: true
  local_models: false
  external_assets: false
  human_in_the_loop: false
  render_similarity: false
  notes:
    - Exactly 5 live benchmark runs.
    - Model is defined inside the agent config.
    - models.ids is kept as default because current generator does not override llm.model.
    - Uses no_python MCP profile to keep Python execution unavailable to the agent.
