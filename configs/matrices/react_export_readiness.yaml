matrix_id: react_export_readiness
title: ReAct/export readiness
description: >
  Readiness matrix for ReAct limits, validator-guided repair, export smoke,
  and hybrid plan_execute_react_repair diagnostics.
tasks:
  ids:
    - geometry_001_basic_primitives
    - materials_001_basic_colors
    - lighting_001_area_light
    - lighting_003_three_point_lighting
    - camera_003_composition_view
    - export_001_blend_file
    - export_002_glb_file
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
    - plan_execute_react_repair_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - inspection_enabled
  - python_enabled
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/react_export_readiness
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: react_export_readiness
  expected_runs: 84
  report_ready_mvp: true
  timestamp_output_root: true
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
