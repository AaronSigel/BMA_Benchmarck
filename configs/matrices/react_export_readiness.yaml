matrix_id: react_export_readiness
title: ReAct/export readiness
description: >
  Readiness matrix for ReAct limits, validator-guided repair, export smoke,
  and hybrid plan_execute_react_repair diagnostics.
tasks:
  ids:
    - geometry_001_basic_primitives
    - materials_001_basic_colors
    - lighting_001_area_light
    - lighting_003_three_point_lighting
    - camera_003_composition_view
    - export_001_blend_file
    - export_002_glb_file
agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
    - plan_execute_react_repair_openrouter
  config_root: configs/agents
mcp_profiles:
  - minimal
  - no_python
  - inspection_enabled
  - python_enabled
  - full
models:
  ids:
    - google/gemini-2.5-flash-lite
execution_modes:
  - agent_mcp
repetitions: 1
output_root: artifacts/experiments/react_export_readiness
report_config_path: configs/reports/default_report.yaml
metadata:
  purpose: react_export_readiness
  expected_runs: 140
  report_ready_mvp: true
  timestamp_output_root: true
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 20
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
    plan_execute_react_repair:
      max_steps: 25
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 3
      repair_activation_diagnostics: true
  readiness_gates:
    export_smoke_required: true
    invalid_tool_response_export_max: 0
    clean_pass_with_error_type_max: 0
    react_max_steps_rate_max: 0.2
    require_react_repair_steps_on_validation_issues: true
    require_hybrid_repair_used_on_failed_validation: true
    hybrid_repair_activation_required_for_failed_validation: true
    snapshot_invalid_schema_max: 0
    reported_success_rate_min: 0.75
    runtime_error_rate_max: 0.10
    infra_error_rate_max: 0.05
    socket_timeout_count_max: 0
    empty_socket_response_count_max: 0
    reset_failure_rate_max: 0.02
    snapshot_failure_rate_max: 0.05
    model_failure_rate_max: 0.20
    validation_failure_rate_max: 0.20
  worker_lifecycle:
    restart_every_n_runs: 20
    geometry_success_rate_min: 0.80
    materials_success_rate_min: 0.85
    camera_success_rate_min: 0.80
    lighting_success_rate_min: 0.70
    export_success_rate_min: 0.75
  cost:
    source: openrouter
    disable_internal_estimate: true
