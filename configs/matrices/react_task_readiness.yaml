matrix_id: react_task_readiness
title: ReAct Task Readiness Gate
description: >
  Fast readiness matrix for ReAct and task stability before the full benchmark.
  Runs 5 representative tasks against 3 strategies, 3 MCP profiles, and 1 model.
  Use this to verify the stand is working before launching diagnostic_repeat_gemini_v5.

tasks:
  ids:
    - geometry_001_basic_primitives
    - materials_001_basic_colors
    - lighting_001_area_light
    - camera_001_front_view
    - export_002_glb_file

agents:
  ids:
    - direct_openrouter
    - plan_execute_openrouter
    - react_openrouter
  config_root: configs/agents

mcp_profiles:
  - minimal
  - inspection_enabled
  - python_enabled

models:
  ids:
    - google/gemini-2.5-flash-lite

execution_modes:
  - agent_mcp

repetitions: 1

output_root: artifacts/experiments/react_task_readiness
report_config_path: configs/reports/default_report.yaml

metadata:
  purpose: readiness_gate
  expected_runs: 45
  report_ready_mvp: true
  timestamp_output_root: true
  preflight:
    enabled: true
    mode: diagnostic
    fail_fast: false
  strategy_limits:
    react:
      max_steps: 20
      stop_after_scene_passed: true
      detect_repeated_actions: true
      detect_duplicate_objects: true
      detect_no_progress: true
      no_progress_limit: 2
