# MCP profile: no_python
# Allowed tools: structured bma_* tools + inspection helpers.
# Python execution and external asset integrations are blocked.

server_distribution: fork
package_source: blender-mcp-bma
command: uvx
args:
  - --from
  - blender-mcp-bma
  - blender-mcp

blender_host: localhost
blender_port: 9876

disable_telemetry: true
profile: no_python

env:
  BMA_MCP_PROFILE: no_python
  DISABLE_TELEMETRY: "true"
