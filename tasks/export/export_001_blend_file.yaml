schema_version: "1.0"
id: export_001_blend_file
title: Save scene as Blender file
category: export
difficulty: easy
prompt: >
  Create a simple scene with a cube, a sphere, and one light source. Save the
  completed scene as result.blend using the export scene tool.
tags:
  - export
  - blend
  - baseline
allowed_tools:
  - create_object
  - assign_material
  - export_scene
  - inspect_scene
expected_scene:
  objects:
    - name: Export_Cube
      type: MESH
      primitive: cube
      location: { x: -1.2, y: 0.0, z: 0.5 }
      material: Cube_Material
      tolerance: 0.1
    - name: Export_Sphere
      type: MESH
      primitive: sphere
      location: { x: 1.2, y: 0.0, z: 0.5 }
      material: Sphere_Material
      tolerance: 0.1
  materials:
    - name: Cube_Material
      base_color: { r: 0.8, g: 0.2, b: 0.2, a: 1.0 }
      roughness: 0.5
      metallic: 0.0
      tolerance: 0.05
    - name: Sphere_Material
      base_color: { r: 0.2, g: 0.4, b: 0.9, a: 1.0 }
      roughness: 0.45
      metallic: 0.0
      tolerance: 0.05
  lights:
    - name: Export_Area_Light
      type: AREA
      location: { x: 0.0, y: -3.0, z: 4.0 }
      rotation: { x: 60.0, y: 0.0, z: 0.0 }
      energy: 400.0
      tolerance: 0.2
  cameras: []
  exports:
    - format: blend
      filename: result.blend
      must_exist: true
success_criteria:
  - metric: object_existence
    weight: 0.45
    required: true
  - metric: export_validity
    weight: 0.55
    required: true
metadata:
  author: benchmark
  version: "1.0"
  description: Export task requiring a saved Blender scene file.

