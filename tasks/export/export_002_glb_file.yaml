schema_version: "1.0"
id: export_002_glb_file
title: Export low-poly scene as GLB
category: export
difficulty: medium
prompt: >
  Create the following five objects with exact locations, dimensions, and
  materials. Object named Lowpoly_Ground: a cube at location (0, 0, -0.05)
  with dimensions (5, 5, 0.1), material named Ground_Green, base_color
  (0.25, 0.65, 0.25, 1.0), roughness 0.7, metallic 0.0. Object named
  Lowpoly_House: a cube at location (-0.8, 0, 0.6) with dimensions
  (1.2, 1.0, 1.2), material named House_Wall, base_color (0.8, 0.68, 0.5,
  1.0), roughness 0.6, metallic 0.0. Object named Lowpoly_Roof: a cone at
  location (-0.8, 0, 1.35) with dimensions (1.5, 1.5, 0.8), material named
  Roof_Red, base_color (0.7, 0.12, 0.08, 1.0), roughness 0.55, metallic 0.0.
  Object named Lowpoly_Tree_Trunk: a cylinder at location (1.2, 0, 0.45) with
  dimensions (0.25, 0.25, 0.9), material named Trunk_Brown, base_color
  (0.35, 0.18, 0.08, 1.0), roughness 0.65, metallic 0.0. Object named
  Lowpoly_Tree_Crown: a sphere at location (1.2, 0, 1.15) with dimensions
  (1.0, 1.0, 1.0), material named Crown_Green, base_color (0.1, 0.45, 0.16,
  1.0), roughness 0.7, metallic 0.0. Export the scene as result.glb.
tags:
  - export
  - glb
  - low-poly
allowed_tools:
  - create_object
  - set_transform
  - assign_material
  - set_material_properties
  - export_scene
  - inspect_scene
expected_scene:
  objects:
    - name: Lowpoly_Ground
      type: MESH
      primitive: cube
      location: { x: 0.0, y: 0.0, z: -0.05 }
      dimensions: { x: 5.0, y: 5.0, z: 0.1 }
      material: Ground_Green
      tolerance: 0.1
    - name: Lowpoly_House
      type: MESH
      primitive: cube
      location: { x: -0.8, y: 0.0, z: 0.6 }
      dimensions: { x: 1.2, y: 1.0, z: 1.2 }
      material: House_Wall
      tolerance: 0.1
    - name: Lowpoly_Roof
      type: MESH
      primitive: cone
      location: { x: -0.8, y: 0.0, z: 1.35 }
      dimensions: { x: 1.5, y: 1.5, z: 0.8 }
      material: Roof_Red
      tolerance: 0.15
    - name: Lowpoly_Tree_Trunk
      type: MESH
      primitive: cylinder
      location: { x: 1.2, y: 0.0, z: 0.45 }
      dimensions: { x: 0.25, y: 0.25, z: 0.9 }
      material: Trunk_Brown
      tolerance: 0.1
    - name: Lowpoly_Tree_Crown
      type: MESH
      primitive: sphere
      location: { x: 1.2, y: 0.0, z: 1.15 }
      dimensions: { x: 1.0, y: 1.0, z: 1.0 }
      material: Crown_Green
      tolerance: 0.1
  materials:
    - name: Ground_Green
      base_color: { r: 0.25, g: 0.65, b: 0.25, a: 1.0 }
      roughness: 0.7
      metallic: 0.0
      tolerance: 0.05
    - name: House_Wall
      base_color: { r: 0.8, g: 0.68, b: 0.5, a: 1.0 }
      roughness: 0.6
      metallic: 0.0
      tolerance: 0.05
    - name: Roof_Red
      base_color: { r: 0.7, g: 0.12, b: 0.08, a: 1.0 }
      roughness: 0.55
      metallic: 0.0
      tolerance: 0.05
    - name: Trunk_Brown
      base_color: { r: 0.35, g: 0.18, b: 0.08, a: 1.0 }
      roughness: 0.65
      metallic: 0.0
      tolerance: 0.05
    - name: Crown_Green
      base_color: { r: 0.1, g: 0.45, b: 0.16, a: 1.0 }
      roughness: 0.7
      metallic: 0.0
      tolerance: 0.05
  lights: []
  cameras: []
  exports:
    - format: glb
      filename: result.glb
      must_exist: true
success_criteria:
  - metric: object_existence
    weight: 0.25
    required: true
  - metric: geometry_accuracy
    weight: 0.2
    required: true
  - metric: material_accuracy
    weight: 0.2
    required: true
  - metric: export_validity
    weight: 0.35
    required: true
metadata:
  author: benchmark
  version: "1.0"
  description: Export task requiring a GLB file for a simple low-poly scene.

