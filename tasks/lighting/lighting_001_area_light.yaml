id: lighting_001_area_light
title: Area light above cube
category: lighting
difficulty: easy
prompt: >
  Create a cube at the origin and add an area light above and in front of it.
  Set the light energy to 500 and place it at coordinates (0, -3, 5).
tags:
  - lighting
  - area-light
  - baseline
allowed_tools:
  - create_object
  - create_light
  - set_transform
  - set_light_properties
  - inspect_scene
expected_scene:
  objects:
    - name: Cube
      type: MESH
      primitive: cube
      location: { x: 0.0, y: 0.0, z: 0.0 }
      tolerance: 0.1
  materials: []
  lights:
    - name: Key_Area_Light
      type: AREA
      location: { x: 0.0, y: -3.0, z: 5.0 }
      rotation: { x: 60.0, y: 0.0, z: 0.0 }
      energy: 500.0
      tolerance: 0.1
  cameras: []
  exports: []
success_criteria:
  - metric: light_existence
    weight: 0.4
    required: true
  - metric: lighting_correctness
    weight: 0.3
    required: true
  - metric: parameter_correctness
    weight: 0.3
    required: true
metadata:
  author: benchmark
  version: "1.0"
  description: Baseline lighting task for one area light.

