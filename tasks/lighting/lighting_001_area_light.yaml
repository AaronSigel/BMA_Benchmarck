schema_version: "1.0"
id: lighting_001_area_light
title: Area light above cube
category: lighting
difficulty: easy
prompt: >
  Create a cube at location (0, 0, 0). Add an AREA light named Key_Area_Light
  at location (0, -3, 5) with rotation (60, 0, 0) degrees and energy 500.
tags:
  - lighting
  - area-light
  - baseline
allowed_tools:
  - create_object
  - create_light
  - set_transform
  - set_light_properties
  - inspect_scene
expected_scene:
  objects:
    - name: Cube
      type: MESH
      primitive: cube
      location: { x: 0.0, y: 0.0, z: 0.0 }
      tolerance: 0.1
  materials: []
  lights:
    - name: Key_Area_Light
      type: AREA
      location: { x: 0.0, y: -3.0, z: 5.0 }
      rotation: { x: 60.0, y: 0.0, z: 0.0 }
      energy: 500.0
      tolerance: 0.1
  cameras: []
  exports: []
success_criteria:
  - metric: object_existence
    weight: 0.10
    required: false
  - metric: object_placement
    weight: 0.05
    required: false
  - metric: light_existence
    weight: 0.35
    required: true
  - metric: lighting_correctness
    weight: 0.25
    required: true
  - metric: parameter_correctness
    weight: 0.25
    required: true
metadata:
  author: benchmark
  version: "1.0"
  description: Baseline lighting task for one area light.

