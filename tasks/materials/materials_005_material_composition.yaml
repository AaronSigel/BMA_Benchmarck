schema_version: "1.0"
id: materials_005_material_composition
title: Material composition scene
category: materials
difficulty: medium
prompt: >
  Create three objects with the following exact specifications. Object named
  Gray_Floor: a cube at location (0, 0, -0.05) with dimensions (6, 6, 0.1),
  material named Gray_Floor_Material, base_color (0.45, 0.45, 0.45, 1.0),
  roughness 0.7, metallic 0.0. Object named Wood_Table: a cube at location
  (0, 0, 0.8) with dimensions (3, 1.5, 0.2), material named Wood_Material,
  base_color (0.55, 0.32, 0.12, 1.0), roughness 0.55, metallic 0.0. Object
  named Metal_Object: a sphere at location (0, 0, 1.15) with dimensions
  (0.5, 0.5, 0.5), material named Polished_Metal, base_color
  (0.75, 0.72, 0.68, 1.0), roughness 0.18, metallic 1.0.
tags:
  - materials
  - composition
  - scene
allowed_tools:
  - create_object
  - set_transform
  - assign_material
  - set_material_properties
  - inspect_scene
expected_scene:
  objects:
    - name: Gray_Floor
      type: MESH
      primitive: cube
      location: { x: 0.0, y: 0.0, z: -0.05 }
      dimensions: { x: 6.0, y: 6.0, z: 0.1 }
      material: Gray_Floor_Material
      tolerance: 0.1
    - name: Wood_Table
      type: MESH
      primitive: cube
      location: { x: 0.0, y: 0.0, z: 0.8 }
      dimensions: { x: 3.0, y: 1.5, z: 0.2 }
      material: Wood_Material
      tolerance: 0.1
    - name: Metal_Object
      type: MESH
      primitive: sphere
      location: { x: 0.0, y: 0.0, z: 1.15 }
      dimensions: { x: 0.5, y: 0.5, z: 0.5 }
      material: Polished_Metal
      tolerance: 0.1
  materials:
    - name: Gray_Floor_Material
      base_color: { r: 0.45, g: 0.45, b: 0.45, a: 1.0 }
      roughness: 0.7
      metallic: 0.0
      tolerance: 0.05
    - name: Wood_Material
      base_color: { r: 0.55, g: 0.32, b: 0.12, a: 1.0 }
      roughness: 0.55
      metallic: 0.0
      tolerance: 0.05
    - name: Polished_Metal
      base_color: { r: 0.75, g: 0.72, b: 0.68, a: 1.0 }
      roughness: 0.18
      metallic: 1.0
      tolerance: 0.05
  lights: []
  cameras: []
  exports: []
success_criteria:
  - metric: object_existence
    weight: 0.25
    required: true
  - metric: object_placement
    weight: 0.10
    required: false
  - metric: material_accuracy
    weight: 0.40
    required: true
  - metric: parameter_correctness
    weight: 0.25
    required: true
metadata:
  author: benchmark
  version: "1.0"
  description: Small scene checking coordinated material assignment.

